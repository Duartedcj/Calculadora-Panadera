<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BakingLab Pro + AI Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 2rem; box-shadow: 0 10px 40px rgba(165, 92, 92, 0.06); }
.input-minimal { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; transition: all 0.2s; }
.input-minimal:focus { border-color: #a55c5c; background: white; outline: none; }
.btn-maroon { background-color: #a55c5c; color: white; transition: all 0.3s; border-radius: 12px; }
.btn-maroon:hover { background-color: #8b4a4a; transform: translateY(-1px); }
.chat-scroll { height: 400px; overflow-y: auto; scrollbar-width: thin; }
.ai-bubble { background: #f0f4ff; border-radius: 18px 18px 18px 0; padding: 12px; font-size: 0.85rem; margin-bottom: 12px; border: 1px solid #e0e7ff; color: #1e293b; white-space: pre-wrap; position: relative; }
.user-bubble { background: #ffffff; border-radius: 18px 18px 0 18px; padding: 12px; font-size: 0.85rem; margin-bottom: 12px; text-align: right; border: 1px solid #e5e7eb; margin-left: auto; max-width: 80%; word-break: break-word; }
.typing { display: flex; gap: 4px; align-items: center; }
.typing span { width: 6px; height: 6px; background: #a55c5c; border-radius: 50%; animation: blink 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
</style>
</head>
<body>

<div class="max-w-4xl w-full glass-card p-8 flex flex-col min-h-[600px]">
<h1 class="text-3xl font-black text-[#a55c5c] mb-6">BakingLab AI</h1>

<div id="chatBox" class="chat-scroll flex-grow pr-2 mb-4">
<div class="ai-bubble">¡Hola! Soy tu experto en panadería. Pídeme una receta o hazme preguntas técnicas.</div>
</div>

<div class="relative">
<input type="text" id="aiInput" onkeypress="if(event.key==='Enter') askAI()" placeholder="Escribe tu duda aquí..." class="input-minimal w-full pr-12 text-sm shadow-sm">
<button onclick="askAI()" class="absolute right-2 top-2 bg-[#a55c5c] text-white p-2 rounded-lg hover:opacity-90">➤</button>
</div>

</div>

<script>
let chatHistory = [];

async function askAI() {
const input = document.getElementById('aiInput');
const chatBox = document.getElementById('chatBox');
if (!input.value) return;

const prompt = input.value;
chatBox.innerHTML += `<div class="user-bubble">${prompt}</div>`;
chatHistory.push({ role: 'user', content: prompt });
input.value = "";

const typingBubble = document.createElement('div');
typingBubble.className = 'ai-bubble';
typingBubble.innerHTML = '<div class="typing"><span></span><span></span><span></span> Generando respuesta...</div>';
chatBox.appendChild(typingBubble);

try {
const response = await fetch('/api/chat', {
method: 'POST',
headers: {'Content-Type':'application/json'},
body: JSON.stringify({
contents: chatHistory.map(msg => ({parts:[{text:msg.content}]}))
})
});

const data = await response.json();
let aiResponse = data.candidates[0].content.parts[0].text;

typingBubble.remove();

// Crear burbuja nueva
const bubble = document.createElement('div');
bubble.className = 'ai-bubble';
bubble.innerHTML = aiResponse;
chatBox.appendChild(bubble);

// 👇 AQUÍ ESTÁ EL CAMBIO IMPORTANTE
bubble.scrollIntoView({ behavior: "smooth", block: "nearest" });

chatHistory.push({role:'assistant', content:aiResponse});

}catch(e){
typingBubble.remove();
chatBox.innerHTML += `<div class="ai-bubble text-red-500">Error de conexión.</div>`;
}
}
</script>

</body>
</html>
