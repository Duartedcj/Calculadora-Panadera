<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakingLab AI Pro | Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 2rem; box-shadow: 0 10px 40px rgba(165, 92, 92, 0.06); }
        .input-minimal { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; transition: all 0.2s; }
        .input-minimal:focus { border-color: #a55c5c; background: white; outline: none; }
        .btn-maroon { background-color: #a55c5c; color: white; transition: all 0.3s; border-radius: 12px; }
        .btn-maroon:hover:not(:disabled) { background-color: #8b4a4a; transform: translateY(-1px); }
        .chat-scroll { height: 400px; overflow-y: auto; scrollbar-width: thin; }
        .ai-bubble { background: #f0f4ff; border-radius: 18px 18px 18px 0; padding: 12px; font-size: 0.85rem; margin-bottom: 12px; border: 1px solid #e0e7ff; color: #1e293b; line-height: 1.5; }
        .user-bubble { background: #ffffff; border-radius: 18px 18px 0 18px; padding: 12px; font-size: 0.85rem; margin-bottom: 12px; text-align: right; border: 1px solid #e5e7eb; margin-left: auto; max-width: 80%; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .bread-image { max-width: 140px; height: auto; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        #studioModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 50; align-items: center; justify-content: center; }
        .loader { width: 16px; height: 16px; border: 2px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="max-w-7xl w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-7 glass-card p-8 flex flex-col">
            <header class="flex justify-between items-start mb-6">
                <div>
                    <h1 class="text-4xl font-black text-[#a55c5c] tracking-tight">BakingLab</h1>
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mt-1">Smart Baker's Station</p>
                </div>
                <div id="hydBadge" class="bg-indigo-50 text-indigo-600 px-4 py-1 rounded-full text-xs font-bold hidden border border-indigo-100"></div>
            </header>

            <div class="space-y-6">
                <div class="flex gap-2">
                    <div class="flex-grow">
                        <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block ml-1">Receta Seleccionada</label>
                        <select id="recipeSelector" onchange="loadRecipe()" class="input-minimal w-full font-bold text-gray-700"></select>
                    </div>
                    <div class="flex items-end gap-2">
                        <button onclick="openStudio()" class="btn-maroon p-3 h-[48px] w-[48px]" title="Crear Nueva Receta">➕</button>
                        <button onclick="deleteCurrentRecipe()" class="bg-gray-100 p-3 h-[48px] w-[48px] rounded-xl text-red-400 hover:bg-red-50" title="Eliminar">🗑️</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block ml-1">Peso Unitario (g)</label>
                        <input type="number" id="unitWeight" value="250" class="input-minimal w-full font-bold text-lg">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block ml-1">Cantidad de Panes</label>
                        <input type="number" id="quantity" value="4" class="input-minimal w-full font-bold text-lg">
                    </div>
                </div>

                <div id="ingredientsGrid" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>

                <button onclick="calculate()" class="btn-maroon py-4 font-bold text-xl shadow-xl shadow-red-100">Calcular Ingredientes</button>

                <div id="resultsCard" class="hidden mt-4 p-6 bg-white rounded-3xl border border-gray-100 shadow-inner">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Masa Total</p>
                    <h2 id="resTotal" class="text-5xl font-black text-[#a55c5c] tracking-tighter mb-4">-</h2>
                    <div id="resList" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col gap-6">
            <div class="glass-card p-8 flex-grow flex flex-col min-h-[500px]">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 bg-[#a55c5c] rounded-full flex items-center justify-center text-white text-xl shadow-lg">✨</div>
                    <div>
                        <h3 class="font-bold text-gray-800 leading-none">Baking AI</h3>
                        <p class="text-[10px] text-green-500 font-bold uppercase mt-1">Sincronizado</p>
                    </div>
                </div>
                
                <div id="chatBox" class="chat-scroll flex-grow pr-2 mb-4">
                    <div class="ai-bubble">¡Hola! ¿En qué puedo ayudarte hoy? Pídeme una receta o consúltame sobre procesos de fermentación.</div>
                </div>

                <div class="relative">
                    <input type="text" id="aiInput" onkeypress="if(event.key==='Enter') askAI()" placeholder="Preguntar al maestro panadero..." class="input-minimal w-full pr-12 text-sm shadow-sm">
                    <button id="aiSendBtn" onclick="askAI()" class="absolute right-2 top-2 bg-[#a55c5c] text-white p-2 rounded-lg hover:opacity-90 transition-opacity flex items-center justify-center">
                        <span id="aiIcon">🚀</span>
                        <span id="aiLoader" class="loader hidden"></span>
                    </button>
                </div>
            </div>

            <div class="glass-card p-8 flex flex-col items-center justify-center text-center">
                <img src="814B52B8-868E-436C-8A11-FF1198932CA3.png" alt="Pan Artesanal" class="bread-image mb-4">
                <p class="text-gray-400 text-xs font-medium">BakingLab Pro v4.2<br>AI Integration Active</p>
            </div>
        </div>
    </div>

    <div id="studioModal">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm shadow-2xl mx-4">
            <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">Nueva Receta</h2>
            <input type="text" id="stName" placeholder="Nombre de la receta" class="input-minimal w-full mb-4 font-semibold text-center">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeStudio()" class="bg-gray-100 py-3 rounded-xl font-bold">Cancelar</button>
                <button onclick="saveStudio()" class="btn-maroon py-3 font-bold">Crear</button>
            </div>
        </div>
    </div>

    <script>
        // LA CLAVE QUE ME PASASTE
        const API_KEY = "AIzaSyC3rmWK_lps10_9q8KNwVRQJo0INzdPtro";
        
        let recipes = JSON.parse(localStorage.getItem('bakingLab_v4')) || {
            "Pan Blanco": [{n:'Agua', p:65}, {n:'Sal', p:2}, {n:'Levadura', p:1.2}],
            "Pizza": [{n:'Agua', p:70}, {n:'Sal', p:3}, {n:'Levadura', p:0.2}]
        };

        function init() {
            const selector = document.getElementById('recipeSelector');
            selector.innerHTML = Object.keys(recipes).map(r => `<option value="${r}">${r}</option>`).join('');
            loadRecipe();
        }

        function loadRecipe() {
            const name = document.getElementById('recipeSelector').value;
            const grid = document.getElementById('ingredientsGrid');
            if(!recipes[name]) return;
            grid.innerHTML = recipes[name].map(ing => `
                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                    <label class="block text-[9px] uppercase font-bold text-gray-400 mb-1">${ing.n} %</label>
                    <input type="number" step="0.1" value="${ing.p}" data-name="${ing.n}" oninput="updateHydrationOnFly()" class="ing-input w-full font-bold text-gray-800 outline-none text-lg">
                </div>`).join('');
            updateHydration(recipes[name]);
        }

        function updateHydration(ings) {
            const liquidTerms = ['agua', 'leche', 'huevo', 'liquido', 'water', 'milk'];
            const totalHyd = ings.reduce((sum, ing) => liquidTerms.some(term => ing.n.toLowerCase().includes(term)) ? sum + ing.p : sum, 0);
            const badge = document.getElementById('hydBadge');
            if(totalHyd > 0) {
                badge.innerText = `Hidratación: ${totalHyd.toFixed(1)}%`;
                badge.classList.remove('hidden');
            } else { badge.classList.add('hidden'); }
        }

        function updateHydrationOnFly() {
            const inputs = document.querySelectorAll('.ing-input');
            const ings = Array.from(inputs).map(i => ({n: i.dataset.name, p: parseFloat(i.value)||0}));
            updateHydration(ings);
        }

        async function askAI() {
            const input = document.getElementById('aiInput');
            const chatBox = document.getElementById('chatBox');
            const btnIcon = document.getElementById('aiIcon');
            const btnLoader = document.getElementById('aiLoader');
            const sendBtn = document.getElementById('aiSendBtn');

            if(!input.value) return;
            
            const prompt = input.value;
            chatBox.innerHTML += `<div class="user-bubble">${prompt}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Bloquear botón y mostrar carga
            sendBtn.disabled = true;
            btnIcon.classList.add('hidden');
            btnLoader.classList.remove('hidden');

            const systemInstruction = "Eres un maestro panadero experto. Si el usuario pide una receta, da una breve explicación y luego añade el código JSON precedido por 'DATA:' con este formato exacto: DATA:{\"nombre\":\"Nombre\", \"ingredientes\":[{\"n\":\"Ingrediente\", \"p\":70}]}. Importante: La harina NUNCA se incluye en el JSON porque es siempre el 100%. Solo usa porcentajes de panadero.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemInstruction + " Pregunta: " + prompt }] }]
                    })
                });
                
                if (!response.ok) throw new Error('Respuesta no válida del servidor');

                const data = await response.json();
                let aiResponse = data.candidates[0].content.parts[0].text;
                
                if (aiResponse.includes("DATA:")) {
                    const parts = aiResponse.split("DATA:");
                    const mainText = parts[0].replace(/```json|```/g, "").trim();
                    const jsonStr = parts[1].trim();
                    
                    chatBox.innerHTML += `<div class="ai-bubble">${mainText} 
                        <button onclick='importFromAI(${jsonStr})' class="mt-3 w-full bg-[#a55c5c] text-white text-[10px] py-3 rounded-xl font-black uppercase tracking-widest shadow-md">
                            📥 Inyectar Receta
                        </button>
                    </div>`;
                } else {
                    chatBox.innerHTML += `<div class="ai-bubble">${aiResponse}</div>`;
                }
            } catch (e) {
                chatBox.innerHTML += `<div class="ai-bubble text-red-500"><b>Error de conexión:</b> No pude hablar con la IA. Revisa si tu conexión a internet es estable o si la clave API es correcta.</div>`;
            } finally {
                sendBtn.disabled = false;
                btnIcon.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function importFromAI(data) {
            recipes[data.nombre] = data.ingredientes;
            localStorage.setItem('bakingLab_v4', JSON.stringify(recipes));
            init();
            document.getElementById('recipeSelector').value = data.nombre;
            loadRecipe();
            calculate();
            alert("✅ Receta '" + data.nombre + "' lista.");
        }

        function calculate() {
            const uw = parseFloat(document.getElementById('unitWeight').value) || 0;
            const qty = parseFloat(document.getElementById('quantity').value) || 0;
            const totalM = uw * qty;
            const inputs = document.querySelectorAll('.ing-input');
            let sumP = 100;
            let ings = [];

            inputs.forEach(i => {
                const p = parseFloat(i.value) || 0;
                sumP += p;
                ings.push({n: i.dataset.name, p: p});
            });

            const flour = (totalM / sumP) * 100;
            document.getElementById('resultsCard').classList.remove('hidden');
            document.getElementById('resTotal').innerText = Math.round(totalM) + "g";

            let html = `<div class="flex justify-between p-4 bg-[#a55c5c] text-white rounded-2xl font-bold shadow-md"><span>Harina (100%)</span><span>${Math.round(flour)}g</span></div>`;
            ings.forEach(ing => {
                const w = (flour * ing.p) / 100;
                html += `<div class="flex justify-between px-4 py-2 border-b border-gray-50 font-semibold text-gray-600"><span>${ing.n} (${ing.p}%)</span><span>${w < 10 ? w.toFixed(1) : Math.round(w)}g</span></div>`;
            });
            document.getElementById('resList').innerHTML = html;
        }

        function openStudio() { document.getElementById('studioModal').style.display = 'flex'; }
        function closeStudio() { document.getElementById('studioModal').style.display = 'none'; }
        
        function saveStudio() {
            const name = document.getElementById('stName').value;
            if(name) {
                recipes[name] = [{n:'Agua', p:65}, {n:'Sal', p:2}];
                localStorage.setItem('bakingLab_v4', JSON.stringify(recipes));
                init();
                document.getElementById('recipeSelector').value = name;
                loadRecipe();
                closeStudio();
            }
        }

        function deleteCurrentRecipe() {
            const name = document.getElementById('recipeSelector').value;
            if(confirm(`¿Eliminar "${name}"?`)) {
                delete recipes[name];
                localStorage.setItem('bakingLab_v4', JSON.stringify(recipes));
                init();
            }
        }

        init();
    </script>
</body>
</html>
