<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakingLab Pro | AI Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 2rem; box-shadow: 0 10px 40px rgba(165, 92, 92, 0.06); }
        .input-minimal { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; transition: all 0.2s; }
        .input-minimal:focus { border-color: #a55c5c; background: white; outline: none; }
        .btn-maroon { background-color: #a55c5c; color: white; transition: all 0.3s; border-radius: 12px; }
        .btn-maroon:hover { background-color: #8b4a4a; }
        .btn-secondary { background-color: #f3f4f6; color: #4b5563; border-radius: 12px; }
        .chat-scroll { height: 380px; overflow-y: auto; }
        .ai-bubble { background: #f0f4ff; border-radius: 15px 15px 15px 0; padding: 10px; font-size: 0.85rem; margin-bottom: 8px; color: #1e293b; }
        .user-bubble { background: #f3f4f6; border-radius: 15px 15px 0 15px; padding: 10px; font-size: 0.85rem; margin-bottom: 8px; text-align: right; }
        .bread-image { max-width: 150px; height: auto; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        #studioModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 50; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="max-w-7xl w-full grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7 glass-card p-10">
            <header class="flex justify-between items-start mb-8">
                <div>
                    <h1 class="text-4xl font-bold text-[#a55c5c]">BakingLab</h1>
                    <p class="text-gray-400 text-sm font-bold uppercase tracking-widest mt-1">Smart Baker's Calculator</p>
                </div>
                <div id="hydBadge" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-xs font-bold hidden"></div>
            </header>

            <div class="space-y-6">
                <div class="flex gap-2">
                    <div class="flex-grow">
                        <label class="text-xs font-bold text-gray-400 uppercase mb-2 block ml-1">Receta</label>
                        <select id="recipeSelector" onchange="loadRecipe()" class="input-minimal w-full font-semibold text-gray-600"></select>
                    </div>
                    <div class="flex items-end gap-2">
                        <button onclick="openStudio()" class="btn-maroon p-3 h-[50px] w-[50px]">🛠️</button>
                        <button onclick="deleteCurrentRecipe()" class="btn-secondary p-3 h-[50px] w-[50px] text-red-400">🗑️</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="unitWeight" value="250" class="input-minimal w-full font-bold text-lg" placeholder="Peso/Pan">
                    <input type="number" id="quantity" value="4" class="input-minimal w-full font-bold text-lg" placeholder="Cantidad">
                </div>

                <div id="ingredientsGrid" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>

                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="calculate()" class="btn-maroon py-4 font-bold text-lg">Calcular</button>
                    <button onclick="location.reload()" class="btn-secondary py-4 font-bold text-lg">Reset</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col gap-6">
            <div class="glass-card p-8 flex-grow flex flex-col min-h-[450px]">
                <h3 class="font-bold text-[#a55c5c] mb-4 flex items-center gap-2">✨ AI Assistant</h3>
                
                <div id="chatBox" class="chat-scroll flex-grow pr-2 mb-4">
                    <div class="ai-bubble">¡Hola! Soy tu asistente. Pídeme una receta o hazme una consulta técnica.</div>
                </div>

                <div class="flex gap-2">
                    <input type="text" id="aiInput" onkeypress="if(event.key==='Enter') askAI()" placeholder="Pregunta algo..." class="input-minimal flex-grow text-sm">
                    <button onclick="askAI()" class="btn-maroon px-4">🚀</button>
                </div>
            </div>

            <div class="glass-card p-8 flex flex-col items-center justify-center text-center">
                <img src="814B52B8-868E-436C-8A11-FF1198932CA3.png" alt="Pan Artesanal" class="bread-image mb-4">
                <p class="text-gray-400 text-xs font-medium">Configura tu receta para<br>obtener los pesos exactos</p>
            </div>
        </div>
    </div>

    <div id="studioModal">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4 text-[#a55c5c]">Nueva Receta</h2>
            <input type="text" id="stName" placeholder="Nombre" class="input-minimal w-full mb-4">
            <div class="flex gap-2">
                <button onclick="closeStudio()" class="btn-secondary w-full py-2">Cancelar</button>
                <button onclick="saveStudio()" class="btn-maroon w-full py-2 font-bold">Crear</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyC3rmWK_lps10_9q8KNwVRQJo0INzdPtro";
        
        let recipes = JSON.parse(localStorage.getItem('bakingLab_v4')) || {
            "Pan Blanco": [{n:'Agua', p:65}, {n:'Sal', p:2}],
            "Pizza": [{n:'Agua', p:70}, {n:'Sal', p:3}]
        };

        function init() {
            const selector = document.getElementById('recipeSelector');
            selector.innerHTML = Object.keys(recipes).map(r => `<option value="${r}">${r}</option>`).join('');
            loadRecipe();
        }

        function loadRecipe() {
            const name = document.getElementById('recipeSelector').value;
            const grid = document.getElementById('ingredientsGrid');
            if(!recipes[name]) return;
            grid.innerHTML = recipes[name].map(ing => `
                <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                    <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">${ing.n} %</label>
                    <input type="number" step="0.1" value="${ing.p}" data-name="${ing.n}" class="ing-input w-full font-bold text-gray-700 outline-none">
                </div>`).join('');
            updateHydration(recipes[name]);
        }

        function updateHydration(ings) {
            const liquids = ['agua', 'leche', 'huevo', 'water', 'milk'];
            const total = ings.reduce((sum, ing) => liquids.some(l => ing.n.toLowerCase().includes(l)) ? sum + ing.p : sum, 0);
            const badge = document.getElementById('hydBadge');
            if(total > 0) {
                badge.innerText = `Hidratación: ${total}%`;
                badge.classList.remove('hidden');
            } else { badge.classList.add('hidden'); }
        }

        async function askAI() {
            const input = document.getElementById('aiInput');
            const chatBox = document.getElementById('chatBox');
            if(!input.value) return;

            const prompt = input.value;
            chatBox.innerHTML += `<div class="user-bubble">${prompt}</div>`;
            input.value = "";

            const system = "Eres un maestro panadero. Si das una receta, añade al final DATA:{\"nombre\":\"Nombre\", \"ingredientes\":[{\"n\":\"Ingrediente\", \"p\":70}]}. Harina es siempre 100% y no va en el JSON.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: system + " Pregunta: " + prompt }] }] })
                });
                
                const data = await response.json();
                let aiText = data.candidates[0].content.parts[0].text;
                
                if (aiText.includes("DATA:")) {
                    const parts = aiText.split("DATA:");
                    const jsonStr = parts[1].trim();
                    chatBox.innerHTML += `<div class="ai-bubble">${parts[0]}<button onclick='importAI(${jsonStr})' class="mt-2 block bg-[#a55c5c] text-white text-[10px] px-2 py-1 rounded-lg">IMPORTAR</button></div>`;
                } else {
                    chatBox.innerHTML += `<div class="ai-bubble">${aiText}</div>`;
                }
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                chatBox.innerHTML += `<div class="ai-bubble text-red-400">Error de conexión.</div>`;
            }
        }

        function importAI(data) {
            recipes[data.nombre] = data.ingredientes;
            localStorage.setItem('bakingLab_v4', JSON.stringify(recipes));
            init();
            document.getElementById('recipeSelector').value = data.nombre;
            loadRecipe();
        }

        function calculate() {
            const uw = parseFloat(document.getElementById('unitWeight').value) || 0;
            const qty = parseFloat(document.getElementById('quantity').value) || 0;
            const totalM = uw * qty;
            const inputs = document.querySelectorAll('.ing-input');
            let sumP = 100;
            let ings = [];

            inputs.forEach(i => {
                const p = parseFloat(i.value) || 0;
                sumP += p;
                ings.push({n: i.dataset.name, p: p});
            });

            const flour = (totalM / sumP) * 100;
            
            // Reutilizamos el panel derecho si quieres o creamos uno flotante. 
            // Para mantener la simplicidad, lo mostramos debajo de la calculadora.
            const resultsHtml = `
                <div id="resultsCard" class="mt-6 p-6 border-t-8 border-[#a55c5c] bg-white rounded-2xl shadow-lg">
                    <p class="text-xs font-bold text-gray-400 uppercase">Masa Total: ${Math.round(totalM)}g</p>
                    <div class="mt-4 space-y-2">
                        <div class="flex justify-between font-bold text-[#a55c5c]"><span>Harina</span><span>${Math.round(flour)}g</span></div>
                        ${ings.map(ing => `<div class="flex justify-between text-gray-600 text-sm border-b pb-1"><span>${ing.n} (${ing.p}%)</span><span>${Math.round((flour * ing.p) / 100)}g</span></div>`).join('')}
                    </div>
                </div>`;
            
            // Insertar resultados al final de la calculadora
            const existing = document.getElementById('resultsCard');
            if(existing) existing.remove();
            document.querySelector('.lg:col-span-7').insertAdjacentHTML('beforeend', resultsHtml);
        }

        function openStudio() { document.getElementById('studioModal').style.display = 'flex'; }
        function closeStudio() { document.getElementById('studioModal').style.display = 'none'; }
        function saveStudio() {
            const name = document.getElementById('stName').value;
            if(name) { recipes[name] = [{n:'Agua', p:65}, {n:'Sal', p:2}]; localStorage.setItem('bakingLab_v4', JSON.stringify(recipes)); init(); closeStudio(); }
        }
        function deleteCurrentRecipe() {
            const name = document.getElementById('recipeSelector').value;
            if(confirm(`¿Borrar ${name}?`)) { delete recipes[name]; localStorage.setItem('bakingLab_v4', JSON.stringify(recipes)); init(); }
        }

        init();
    </script>
</body>
</html>
