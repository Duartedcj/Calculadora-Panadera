<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakingLab Pro + Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 2rem; box-shadow: 0 10px 40px rgba(165, 92, 92, 0.06); }
        .input-minimal { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; transition: all 0.2s; }
        .input-minimal:focus { border-color: #a55c5c; background: white; outline: none; }
        .btn-maroon { background-color: #a55c5c; color: white; transition: all 0.3s; border-radius: 12px; }
        .btn-maroon:hover { background-color: #8b4a4a; }
        .btn-secondary { background-color: #f3f4f6; color: #4b5563; border-radius: 12px; }
        .bread-image { max-width: 150px; height: auto; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        
        /* Estilos del Studio (Modal) */
        #studioModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 50; align-items: center; justify-content: center; }
        .studio-content { background: white; width: 90%; max-width: 500px; border-radius: 2rem; padding: 2rem; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="studioModal">
        <div class="studio-content shadow-2xl">
            <h2 class="text-2xl font-bold text-[#a55c5c] mb-1">BakingLab Studio</h2>
            <p class="text-gray-400 text-xs mb-6 uppercase font-bold tracking-wider">Editor de Recetas</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase block mb-1">Nombre de la Receta</label>
                    <input type="text" id="newRecipeName" placeholder="Ej: Pan de Masa Madre" class="input-minimal w-full">
                </div>
                
                <div id="studioIngredients" class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase block">Ingredientes (Harina es 100%)</label>
                    </div>

                <button onclick="addIngredientRow()" class="text-[#a55c5c] text-sm font-bold flex items-center gap-1 hover:underline">
                    + Añadir Ingrediente
                </button>

                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button onclick="closeStudio()" class="btn-secondary py-3 font-bold">Cancelar</button>
                    <button onclick="saveStudioRecipe()" class="btn-maroon py-3 font-bold">Guardar Receta</button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-7 glass-card p-10">
            <header class="flex justify-between items-start mb-8">
                <div>
                    <h1 class="text-4xl font-bold text-[#a55c5c]">BakingLab</h1>
                    <p class="text-gray-400 text-sm font-bold uppercase tracking-widest mt-1">Smart Baker's Calculator</p>
                </div>
                <div id="hydrationBadge" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-xs font-bold hidden"></div>
            </header>

            <div class="space-y-6">
                <div class="flex gap-2">
                    <div class="flex-grow">
                        <label class="text-xs font-bold text-gray-400 uppercase mb-2 block">Receta</label>
                        <select id="recipeSelector" onchange="loadRecipe()" class="input-minimal w-full font-semibold text-gray-600"></select>
                    </div>
                    <div class="flex items-end gap-2">
                        <button onclick="openStudio()" class="btn-maroon p-3" title="BakingLab Studio">🛠️ Studio</button>
                        <button onclick="deleteCurrentRecipe()" class="btn-secondary p-3 text-red-400" title="Borrar Receta">🗑️</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs font-bold text-gray-400 uppercase mb-1 block">Peso/Pan (g)</label>
                        <input type="number" id="unitWeight" value="250" class="input-minimal w-full font-bold text-lg"></div>
                    <div><label class="text-xs font-bold text-gray-400 uppercase mb-1 block">Cantidad</label>
                        <input type="number" id="quantity" value="4" class="input-minimal w-full font-bold text-lg"></div>
                </div>

                <div id="ingredientsGrid" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>

                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="calculate()" class="btn-maroon py-4 font-bold text-lg">Calcular</button>
                    <button onclick="location.reload()" class="btn-secondary py-4 font-bold text-lg">Reset</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col gap-6">
            <div id="resultsCard" class="hidden glass-card p-8 border-t-[12px] border-[#a55c5c]">
                <p class="text-xs font-bold text-gray-400 uppercase mb-1">Masa Total</p>
                <h2 id="resTotal" class="text-6xl font-black text-[#a55c5c] tracking-tighter mb-8">-</h2>
                <div id="resList" class="space-y-3"></div>
            </div>
            <div id="placeholder" class="glass-card flex-grow p-12 flex flex-col items-center justify-center text-center">
                <img src="814B52B8-868E-436C-8A11-FF1198932CA3.png" alt="Pan" class="bread-image mb-6">
                <p class="text-gray-400 font-medium">Usa el Studio para crear tus recetas</p>
            </div>
        </div>
    </div>

    <script>
        let recipes = JSON.parse(localStorage.getItem('bakingLab_v3')) || {
            "Pan Blanco": [{n:'Agua', p:65}, {n:'Sal', p:2}, {n:'Levadura', p:1.2}],
            "Pizza": [{n:'Agua', p:70}, {n:'Sal', p:3}]
        };

        function init() {
            const selector = document.getElementById('recipeSelector');
            selector.innerHTML = Object.keys(recipes).map(r => `<option value="${r}">${r}</option>`).join('');
            loadRecipe();
        }

        function loadRecipe() {
            const name = document.getElementById('recipeSelector').value;
            const grid = document.getElementById('ingredientsGrid');
            if(!recipes[name]) return;
            grid.innerHTML = recipes[name].map(ing => `
                <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                    <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">${ing.n} %</label>
                    <input type="number" step="0.1" value="${ing.p}" data-name="${ing.n}" class="ing-input w-full font-bold text-gray-700 outline-none">
                </div>`).join('');
            updateHydration(recipes[name]);
        }

        function updateHydration(ings) {
            const liquids = ['agua', 'leche', 'huevo', 'water', 'milk'];
            const total = ings.reduce((sum, ing) => liquids.some(l => ing.n.toLowerCase().includes(l)) ? sum + ing.p : sum, 0);
            const badge = document.getElementById('hydrationBadge');
            if(total > 0) { badge.innerText = `Hidratación: ${total}%`; badge.classList.remove('hidden'); }
            else { badge.classList.add('hidden'); }
        }

        // --- FUNCIONES DEL STUDIO ---
        function openStudio() {
            document.getElementById('studioModal').style.display = 'flex';
            document.getElementById('studioIngredients').innerHTML = '';
            addIngredientRow(); // Iniciar con una fila vacía
        }

        function closeStudio() { document.getElementById('studioModal').style.display = 'none'; }

        function addIngredientRow() {
            const div = document.createElement('div');
            div.className = "flex gap-2";
            div.innerHTML = `
                <input type="text" placeholder="Ingrediente" class="studio-n input-minimal flex-grow text-sm">
                <input type="number" placeholder="%" class="studio-p input-minimal w-20 text-sm">
                <button onclick="this.parentElement.remove()" class="text-red-400 px-2">✕</button>
            `;
            document.getElementById('studioIngredients').appendChild(div);
        }

        function saveStudioRecipe() {
            const name = document.getElementById('newRecipeName').value.trim();
            const names = document.querySelectorAll('.studio-n');
            const percents = document.querySelectorAll('.studio-p');
            
            if(!name) return alert("Ponle un nombre a la receta");
            
            let newIngs = [];
            names.forEach((n, i) => {
                if(n.value) newIngs.push({ n: n.value, p: parseFloat(percents[i].value) || 0 });
            });

            recipes[name] = newIngs;
            localStorage.setItem('bakingLab_v3', JSON.stringify(recipes));
            init();
            document.getElementById('recipeSelector').value = name;
            loadRecipe();
            closeStudio();
        }

        function deleteCurrentRecipe() {
            const name = document.getElementById('recipeSelector').value;
            if(confirm(`¿Borrar ${name}?`)) {
                delete recipes[name];
                localStorage.setItem('bakingLab_v3', JSON.stringify(recipes));
                init();
            }
        }

        function calculate() {
            const totalM = (parseFloat(document.getElementById('unitWeight').value) || 0) * (parseFloat(document.getElementById('quantity').value) || 0);
            const inputs = document.querySelectorAll('.ing-input');
            let sumP = 100;
            let ings = [];

            inputs.forEach(i => {
                const p = parseFloat(i.value) || 0;
                sumP += p;
                ings.push({n: i.getAttribute('data-name'), p: p});
            });

            const flour = (totalM / sumP) * 100;
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('resultsCard').classList.remove('hidden');
            document.getElementById('resTotal').innerText = Math.round(totalM) + "g";

            let html = `<div class="flex justify-between p-4 bg-[#a55c5c] text-white rounded-xl font-bold"><span>Harina (100%)</span><span>${Math.round(flour)}g</span></div>`;
            ings.forEach(ing => {
                const w = (flour * ing.p) / 100;
                html += `<div class="flex justify-between px-4 py-2 border-b border-gray-100 font-medium text-gray-600"><span>${ing.n} (${ing.p}%)</span><span>${w < 10 ? w.toFixed(1) : Math.round(w)}g</span></div>`;
            });
            document.getElementById('resList').innerHTML = html;
        }

        init();
    </script>
</body>
</html>
