<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BakingLab Pro + AI Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.glass-card { background: rgba(255,255,255,0.95); border-radius: 2rem; box-shadow: 0 10px 40px rgba(165,92,92,0.06); }
.input-minimal { background:#f9fafb; border:1px solid #e5e7eb; border-radius:12px; padding:12px; }
.input-minimal:focus { border-color:#a55c5c; background:white; outline:none; }
.btn-maroon { background:#a55c5c; color:white; border-radius:12px; }
.btn-maroon:hover { background:#8b4a4a; }
.chat-scroll { height:400px; overflow-y:auto; }
.ai-bubble { background:#f0f4ff; border-radius:18px 18px 18px 0; padding:12px; font-size:0.85rem; margin-bottom:12px; border:1px solid #e0e7ff; white-space:pre-wrap; }
.user-bubble { background:white; border-radius:18px 18px 0 18px; padding:12px; font-size:0.85rem; margin-bottom:12px; text-align:right; border:1px solid #e5e7eb; margin-left:auto; max-width:80%; }
.typing { display:flex; gap:4px; align-items:center; }
.typing span { width:6px; height:6px; background:#a55c5c; border-radius:50%; animation:blink 1.2s infinite; }
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
</style>
</head>
<body>

<div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-2 gap-6">

<!-- PANEL CALCULADORA -->
<div class="glass-card p-6">
<h1 class="text-3xl font-black text-[#a55c5c] mb-4">BakingLab</h1>

<select id="recipeSelector" onchange="loadRecipe()" class="input-minimal w-full mb-4"></select>

<div id="ingredientsGrid" class="grid grid-cols-2 gap-3 mb-4"></div>

<button onclick="calculate()" class="btn-maroon w-full py-3 font-bold">Calcular</button>

<div id="resultsCard" class="hidden mt-4">
<h2 class="font-bold mb-2">Resultados</h2>
<div id="resList"></div>
</div>
</div>

<!-- PANEL CHAT -->
<div class="glass-card p-6 flex flex-col">
<h2 class="font-bold mb-4">Asistente AI</h2>

<div id="chatBox" class="chat-scroll flex-grow mb-4">
<div class="ai-bubble">Hola 👋 Soy tu experto panadero.</div>
</div>

<div class="flex gap-2">
<input id="aiInput" class="input-minimal flex-grow" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') askAI()">
<button onclick="askAI()" class="btn-maroon px-4">Enviar</button>
</div>
</div>

</div>

<script>

let recipes = JSON.parse(localStorage.getItem('bakingLab_v4')) || {
"Pan Blanco":[{n:'Agua',p:65},{n:'Sal',p:2},{n:'Levadura',p:1.2}]
};

let chatHistory = [];

function init(){
const selector=document.getElementById('recipeSelector');
selector.innerHTML=Object.keys(recipes).map(r=>`<option>${r}</option>`).join('');
loadRecipe();
}
init();

function loadRecipe(){
const name=document.getElementById('recipeSelector').value;
const grid=document.getElementById('ingredientsGrid');
grid.innerHTML=recipes[name].map(i=>`
<div>
<label class="text-xs">${i.n} %</label>
<input type="number" value="${i.p}" data-name="${i.n}" class="ing-input input-minimal w-full">
</div>`).join('');
}

function calculate(){
const inputs=document.querySelectorAll('.ing-input');
let html="";
inputs.forEach(i=>{
html+=`<div>${i.dataset.name}: ${i.value}%</div>`;
});
document.getElementById('resultsCard').classList.remove('hidden');
document.getElementById('resList').innerHTML=html;
}

async function askAI(){
const input=document.getElementById('aiInput');
const chatBox=document.getElementById('chatBox');
if(!input.value) return;

const prompt=input.value;
chatBox.innerHTML+=`<div class="user-bubble">${prompt}</div>`;
chatHistory.push({role:'user',content:prompt});
input.value="";
chatBox.scrollTop=chatBox.scrollHeight;

const typing=document.createElement('div');
typing.className='ai-bubble';
typing.innerHTML='<div class="typing"><span></span><span></span><span></span> Generando...</div>';
chatBox.appendChild(typing);
chatBox.scrollTop=chatBox.scrollHeight;

const systemInstruction=`Eres un maestro panadero experto.
Cuando el usuario pide una receta:
1) Breve reseña.
2) Ingredientes.
3) Pasos numerados.
Agrega DATA: {"nombre":"Nombre","ingredients":[{"n":"Agua","p":70}]}`;

try{

const response=await fetch('/api/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
contents:[
{parts:[{text:systemInstruction}]},
...chatHistory.map(m=>({parts:[{text:m.content}]}))
]
})
});

const data=await response.json();
console.log("Respuesta servidor:",data);

typing.remove();

if(data.error){
chatBox.innerHTML+=`<div class="ai-bubble text-red-500">${data.error}</div>`;
return;
}

if(!data.candidates || !data.candidates[0]){
chatBox.innerHTML+=`<div class="ai-bubble text-red-500">Respuesta inválida del modelo</div>`;
return;
}

let aiText=data.candidates[0].content.parts[0].text;

if(aiText.includes("DATA:")){
const parts=aiText.split("DATA:");
const text=parts[0];
const jsonStr=parts[1].replace(/```json|```/g,"").trim();
const recipeData=JSON.parse(jsonStr);

const bubble=document.createElement('div');
bubble.className='ai-bubble';
bubble.innerHTML=`${text}
<button onclick='addRecipe(${JSON.stringify(recipeData)})' class="btn-maroon w-full mt-2 py-1 text-xs">
Agregar a mis recetas
</button>`;
chatBox.appendChild(bubble);
chatHistory.push({role:'assistant',content:text});
}else{
chatBox.innerHTML+=`<div class="ai-bubble">${aiText}</div>`;
chatHistory.push({role:'assistant',content:aiText});
}

if(chatHistory.length>7) chatHistory=chatHistory.slice(-7);

chatBox.scrollTop=chatBox.scrollHeight;

}catch(e){
typing.remove();
chatBox.innerHTML+=`<div class="ai-bubble text-red-500">Error conexión: ${e.message}</div>`;
}
}

function addRecipe(data){
recipes[data.nombre]=data.ingredients;
localStorage.setItem('bakingLab_v4',JSON.stringify(recipes));
init();
alert("Receta agregada");
}

</script>

</body>
</html>
